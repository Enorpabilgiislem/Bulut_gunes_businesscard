<style>
  html, body { -webkit-tap-highlight-color: transparent; }
  body { background: #F7F5F3; }
  @media (prefers-color-scheme: dark) { body { background: #232426; } }

  /* Signature element: a single slow foil sweep across the card border in
     the brand orange, once on load */
  @keyframes foil-sweep {
    0%   { background-position: -150% 0; }
    100% { background-position: 250% 0; }
  }
  .foil-edge {
    background: linear-gradient(
      100deg,
      transparent 30%,
      rgba(244, 103, 54, 0.55) 45%,
      rgba(255, 168, 122, 0.9) 50%,
      rgba(244, 103, 54, 0.55) 55%,
      transparent 70%
    );
    background-size: 250% 100%;
    background-position: -150% 0;
    animation: foil-sweep 2.2s ease-out 0.3s 1 forwards;
  }
  @media (prefers-reduced-motion: reduce) {
    .foil-edge { animation: none; }
  }

  .card-surface {
    background: #FFFFFF;
    border: 1px solid rgba(65, 66, 68, 0.1);
  }
  @media (prefers-color-scheme: dark) {
    .card-surface { background: #2C2D30; border-color: rgba(255,255,255,0.08); }
  }

  /* Fallback cover banner when no coverUrl photo is supplied */
  .cover-fallback {
    background:
      radial-gradient(120% 180% at 15% 0%, rgba(255,255,255,0.14) 0%, transparent 55%),
      linear-gradient(120deg, #414244 0%, #2A2B2D 55%, #F46736 145%);
  }

  .row-link:active { transform: scale(0.98); }

  .avatar-ring {
    background: conic-gradient(from 180deg, #F46736, #FFAF8C, #F46736);
  }

</style>
</head>

<body class="font-body min-h-screen flex items-center justify-center px-4 py-10 text-ink dark:text-paper">

  <main class="w-full max-w-sm">

    <!-- ============ CARD ============ -->
    <section class="card-surface relative rounded-3xl shadow-xl shadow-black/5 dark:shadow-black/40 overflow-hidden">

      <!-- Foil sweep accent line -->
      <div class="foil-edge absolute inset-x-0 top-0 h-1"></div>

      <!-- Cover banner -->
      <div id="coverBanner" class="cover-fallback h-28 w-full"></div>

      <!-- Avatar + logo badge, overlapping the banner -->
      <div class="px-6">
        <div class="relative -mt-10 w-20 h-20">
          <div class="avatar-ring w-20 h-20 rounded-full p-[3px] shadow-md">
            <img
              id="avatarImg"
              src=""
              alt="Profil fotoğrafı"
              class="w-full h-full object-cover rounded-full ring-4 ring-white dark:ring-[#2C2D30] bg-gray-200 dark:bg-gray-700"
            />
          </div>
          <div id="logoBadge" class="absolute -right-1.5 -bottom-1.5 w-8 h-8 rounded-full bg-white dark:bg-[#2C2D30] ring-2 ring-white dark:ring-[#2C2D30] shadow-md flex items-center justify-center overflow-hidden">
            <img id="logoImg" src="" alt="Şirket logosu" class="w-full h-full object-cover hidden" />
            <span id="logoFallback" class="text-[7px] font-display font-bold tracking-tight text-accent"></span>
          </div>
        </div>
      </div>

      <!-- Name / title -->
      <div class="px-6 pt-3 pb-5">
        <h1 id="nameEl" class="font-display font-semibold text-2xl tracking-tight"></h1>
        <p id="titleEl" class="text-sm text-ink/60 dark:text-paper/60 mt-1"></p>
        <p id="companyEl" class="text-[13px] uppercase tracking-[0.14em] text-accent font-medium mt-2"></p>
      </div>

      <!-- Divider -->
      <div class="h-px mx-6 bg-ink/10 dark:bg-paper/10"></div>

      <!-- Action buttons: share + save -->
      <div class="px-6 pt-1 pb-4 flex items-center gap-2.5">
        <button
          id="shareBtn"
          class="row-link flex-1 flex items-center justify-center gap-1.5 bg-ink text-white dark:bg-paper dark:text-ink font-semibold text-[13px] rounded-full py-2.5 px-3 shadow-md active:scale-[0.98] transition-transform"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M19 8v6M22 11h-6" />
          </svg>
          <span id="shareBtnLabel" class="truncate">Gönder | Share</span>
        </button>
        <button
          id="saveBtn"
          class="row-link flex-1 flex items-center justify-center gap-1.5 bg-transparent text-ink dark:text-paper border border-ink/20 dark:border-paper/25 font-semibold text-[13px] rounded-full py-2.5 px-3 active:scale-[0.98] transition-transform"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15V3m0 12l-4-4m4 4l4-4" />
            <path d="M2 17l.6 3.2A2 2 0 0 0 4.57 22h14.86a2 2 0 0 0 1.97-1.8L22 17" />
          </svg>
          Kaydet | Save
        </button>
      </div>
      <p id="saveHint" class="text-center text-[11px] text-ink/40 dark:text-paper/40 -mt-2 pb-3 px-6"></p>

      <!-- Divider -->
      <div class="h-px mx-6 bg-ink/10 dark:bg-paper/10"></div>

      <!-- Contact rows -->
      <div class="px-4 py-3 space-y-1" id="contactRows"></div>

      <!-- WhatsApp button -->
      <div class="px-6 pb-1" id="whatsappWrap">
        <a
          id="whatsappBtn"
          href="#"
          target="_blank" rel="noopener"
          class="row-link flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-[#25D366]/10 hover:bg-[#25D366]/15 transition"
        >
          <span class="w-9 h-9 shrink-0 rounded-full bg-[#25D366] flex items-center justify-center text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="currentColor">

  twitter: `<path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>`,

  whatsapp: `<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>`,

/* -------------------------------------------------------------------------
   RENDER: contact rows

function contactRow({ icon, label, value, href }) {

      </span>
      <span class="text-ink/25 dark:text-paper/25">${svg("chevron", "w-4 h-4")}</span>

}

const rowsHtml = [];
if (PROFILE.phone) {
  rowsHtml.push(contactRow({ icon: "phone", label: "Telefon", value: PROFILE.phone, href: `tel:${PROFILE.phone.replace(/\s+/g, "")}` }));

if (PROFILE.email) {
  rowsHtml.push(contactRow({ icon: "email", label: "E-posta", value: PROFILE.email, href: `mailto:${PROFILE.email}` }));
}
if (PROFILE.website) {

}
{
  const addr = PROFILE.address || {};
  const addrParts = [addr.city, addr.state, addr.country].filter(Boolean);
  if (addrParts.length) {
    const addrValue = addrParts.join(", ");
    rowsHtml.push(contactRow({

}
document.getElementById("contactRows").innerHTML = rowsHtml.join("");

/* -------------------------------------------------------------------------
   RENDER: social icon row
   ------------------------------------------------------------------------- */
const socialHtml = (PROFILE.social || [])
  .filter((s) => ICONS[s.type])
  .map(

socialRowEl.innerHTML = socialHtml;

  document.getElementById("socialSection").style.display = "none";

/* -------------------------------------------------------------------------
   VCARD GENERATION + DOWNLOAD
   Builds a standards-compliant vCard 3.0 string (CRLF line endings, escaped
   special characters) and triggers a download that opens directly in the
   native Contacts app on both iOS Safari and Android Chrome.
   ------------------------------------------------------------------------- */
function escapeVCardValue(value = "") {
  return String(value)
    .replace(/\\/g, "\\\\")
    .replace(/;/g, "\\;")
    .replace(/,/g, "\\,")
    .replace(/\n/g, "\\n");
}

function buildVCard(profile) {
  const CRLF = "\r\n";
  const addr = profile.address || {};
  const hasAddress = addr.street || addr.city || addr.state || addr.zip || addr.country;

  const lines = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    `N:${escapeVCardValue(profile.lastName)};${escapeVCardValue(profile.firstName)};;;`,
    `FN:${escapeVCardValue(`${profile.firstName} ${profile.lastName}`.trim())}`,
  ];

  if (profile.company) lines.push(`ORG:${escapeVCardValue(profile.company)}`);
  if (profile.title) lines.push(`TITLE:${escapeVCardValue(profile.title)}`);
  if (profile.phone) lines.push(`TEL;TYPE=CELL,VOICE:${escapeVCardValue(profile.phone)}`);
  if (profile.email) lines.push(`EMAIL;TYPE=INTERNET:${escapeVCardValue(profile.email)}`);
  if (profile.website) lines.push(`URL:${escapeVCardValue(profile.website)}`);

  if (hasAddress) {
    // ADR fields: PO Box;Extended;Street;City;State;Zip;Country
    lines.push(
      `ADR;TYPE=WORK:;;${escapeVCardValue(addr.street)};${escapeVCardValue(addr.city)};${escapeVCardValue(
        addr.state
      )};${escapeVCardValue(addr.zip)};${escapeVCardValue(addr.country)}`
    );
  }

  (profile.social || []).forEach((s) => {
    lines.push(`URL;TYPE=${escapeVCardValue(s.type).toUpperCase()}:${escapeVCardValue(s.url)}`);
  });

  lines.push("END:VCARD");

  return lines.join(CRLF) + CRLF;
}

function saveToContacts() {
  const vCardString = buildVCard(PROFILE);
  const blob = new Blob([vCardString], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.setAttribute("download", PROFILE.vcfFileName);
  // Some iOS Safari versions handle vCards more reliably when navigated to
  // directly rather than only appended/clicked, so we do both: append+click
  // for Android/desktop browsers, and fall back to direct navigation.
  document.body.appendChild(link);

  try {
    link.click();
  } finally {
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }
}

document.getElementById("saveBtn").addEventListener("click", saveToContacts);

/* Hint text under the button */

/* -------------------------------------------------------------------------
   SHARE / EXCHANGE BUTTON
   Uses the native Web Share API when available (lets the person send the
   card link straight to another app — Messages, WhatsApp, Mail, etc).
   Falls back to copying the link to the clipboard on unsupported browsers.
   ------------------------------------------------------------------------- */
async function shareCard() {
  const shareData = {
    title: `${fullName} — Dijital Kartvizit`,
    text: `${fullName}${PROFILE.title ? " · " + PROFILE.title : ""}${PROFILE.company ? " · " + PROFILE.company : ""}`,
    url: window.location.href,
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
    } catch (err) {
      // User canceled the share sheet — no action needed.
    }
    return;
  }

  try {
    await navigator.clipboard.writeText(window.location.href);
    const label = document.getElementById("shareBtnLabel");
    const original = label.textContent;
    label.textContent = "Kopyalandı | Copied";
    setTimeout(() => { label.textContent = original; }, 1800);
  } catch (err) {
    window.open(shareData.url, "_blank");
  }
}

document.getElementById("shareBtn").addEventListener("click", shareCard);
